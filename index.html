
<!DOCTYPE html>
<html class="theme-dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SKRT7 | Bio</title>
  
  <style>
    /* ==========================================
       🎨 التنسيقات الأساسية
       ========================================== */
    :root {
      --bg-color: #07080B;
      --text-color: #E4E6EB;
      --card-bg: #1F222F;
      --sub-text: #94A3B8;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    /* ==========================================
       ⏳ صفحة التحميل (اللودر الجديد)
       ========================================== */
    .loading-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: var(--bg-color);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.8s ease, visibility 0.8s;
    }

    .loading-screen.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    /* كود اللودر من 1000154444.jpg */
    .container-loader {
      --size: 300px;
      width: var(--size);
      height: var(--size);
      position: relative;
      zoom: 0.5;
      transform: translateX(-50%);
    }

    .ball {
      position: absolute;
      width: calc(var(--size) + var(--i));
      height: calc(var(--size) + var(--i));
      background-color: var(--color);
      border-radius: 50%;
      animation: move 5s linear infinite;
      transform-origin: var(--size);
      mix-blend-mode: hard-light;
      animation-duration: var(--d);
      filter: blur(58px);
    }

    .ball:nth-child(even) {
      animation-direction: reverse;
    }

    @keyframes move {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(359deg); }
    }

    /* بقية تنسيقات موقعك */
    .container { margin-top: 10vh; }
    .avatar { border: 3px solid var(--card-bg); width: 128px; height: 128px; border-radius: 50%; margin-bottom: 15px; }
  </style>
</head> 

<body>

  <!-- صفحة التحميل -->
  <div class="loading-screen" id="loadingScreen">
    <div class="container-loader">
      <div class="ball" style="--i: 20px; --color: #ff0055; --d: 3s;"></div>
      <div class="ball" style="--i: 50px; --color: #00ffaa; --d: 4s;"></div>
      <div class="ball" style="--i: 80px; --color: #00ccff; --d: 5s;"></div>
      <div class="ball" style="--i: 110px; --color: #ffaa00; --d: 3.5s;"></div>
    </div>
  </div>

  <div class="container">
    <img class="avatar" src="images/avatar.png" alt="SKRT7">
    <h1>SKRT7</h1>
    <p>Developer & Discord Server Manager.</p>
  </div>

  <script>
    // إخفاء صفحة التحميل بعد 2.5 ثانية من فتح الموقع
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loadingScreen').classList.add('fade-out');
      }, 2500);
    });
  </script>
</body>
</html>
