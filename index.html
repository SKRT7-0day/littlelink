<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKRT7 | Bio</title>
    <style>
        /* 1. التنسيقات الأساسية */
        :root { --bg: #07080B; --text: #E4E6EB; --card: #1F222F; }
        .light { --bg: #F8FAFC; --text: #0F172A; --card: #E2E8F0; }
        body { background: var(--bg); color: var(--text); transition: 0.4s; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }

        /* 2. حاوية الاسم والقصاصات */
        #name-box { cursor: crosshair; display: inline-block; padding: 40px; position: relative; }
        .name { font-size: 3rem; font-weight: 900; background: linear-gradient(45deg, #ff007f, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* 3. زر الوضع الليلي (Uiverse 3D) */
        .toggle { position: relative; height: 100px; width: 100px; display: inline-block; margin: 20px; }
        .toggle input { opacity: 0; position: absolute; width: 100%; height: 100%; cursor: pointer; z-index: 2; }
        .toggle .btn-3d { position: absolute; left: 50%; top: 50%; margin: -34px; width: 68px; height: 68px; border-radius: 50%; background: #eaeaea; box-shadow: 0 15px 25px rgba(0,0,0,0.5), inset 0 -3px 4px rgba(0,0,0,0.2); transition: 0.3s; }
        .toggle .label { position: absolute; width: 100%; height: 100%; line-height: 100px; font-size: 28px; pointer-events: none; }
        .toggle input:checked ~ .btn-3d { box-shadow: inset 0 8px 20px rgba(0,0,0,0.4); background: #ccc; }

        /* 4. أزرار الشاحنات */
        .truck-btn { width: 100%; max-width: 320px; margin: 15px auto; padding: 18px; border-radius: 20px; border: 1px solid #333; background: var(--card); color: var(--text); cursor: pointer; position: relative; overflow: hidden; display: block; font-weight: bold; }
        .truck { position: absolute; left: -60px; font-size: 1.5rem; transition: 1.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .truck-btn.go .truck { left: 110%; }
    </style>
</head>
<body>

    <div id="name-box"><h1 class="name">SKRT7.</h1></div>

    <div class="toggle">
        <input type="checkbox" id="theme-cb">
        <span class="btn-3d"></span>
        <span class="label" id="icon">🌙</span>
    </div>

    <button class="truck-btn" data-url="https://discord.gg/Vk8WJhpQW4">
        <span class="truck">🚚</span> Discord
    </button>

    <script>
        // تفعيل القصاصات
        document.getElementById('name-box').addEventListener('mousemove', (e) => {
            const el = document.createElement('div');
            el.innerHTML = '✨'; el.style.position = 'absolute'; el.style.left = e.pageX + 'px'; el.style.top = e.pageY + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        });

        // تبديل الثيم
        const cb = document.getElementById('theme-cb');
        cb.addEventListener('change', () => {
            document.body.classList.toggle('light');
            document.getElementById('icon').textContent = cb.checked ? '☀️' : '🌙';
        });

        // تفعيل الشاحنات
        document.querySelectorAll('.truck-btn').forEach(b => {
            b.addEventListener('click', () => {
                b.classList.add('go');
                setTimeout(() => window.location.href = b.dataset.url, 1600);
            });
        });
    </script>
</body>
</html>
